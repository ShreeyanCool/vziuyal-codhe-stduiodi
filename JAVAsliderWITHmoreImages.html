<!DOCTYPE html>

<head>
    <title> slider </title>
</head>

 <body>

<section>
    <img class="mySlides" src="imagesANDsounds/scp-3008 worker.jpg" style="height:500px; width:900px;">
    <img class="mySlides" src="imagesANDsounds/I GOT YEETED BY THE CURSED KIRBY AAH.png" style="height:500px; width:900px;">
    <img class="mySlides" src="imagesANDsounds/tanned_2_much.png" style="height:500px; width:900px;">
</section>

<script>
    
    var myIndex = 0;
    carousel();

    function carousel() {
        var i;
        var x = document.getElementsByClassName("mySlides");
        for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";
        }
        myIndex++;
        if (myIndex > x.length) { myIndex = 1 }
        x[myIndex - 1].style.display = "block";
        setTimeout(carousel, 5000);
    }
</script>

 <p> image changes every 5 seconds now </p>

  </body>


  </html>
