<!DOCTYPE html>

<head> <title>Grid Example</title>
<meta name="viewport" content="width=device-width, initial-
scale=1">
<meta charset="utf-8">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap
.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.
js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.m

<style>
    .col {
        text-align: center;
        border: 1px solid black;
    }
</style>

</head>

<body>

    <h3> equal width column grid </h3>

    <div class="container">
        <div class="rows">
            <div class="col">
                column 1
            </div>
            <div class="col">
                column 2
            </div>
            <div class="col">
                column 3
            </div>
        </div>
    </div>
</body>
