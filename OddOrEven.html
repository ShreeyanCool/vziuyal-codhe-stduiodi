<!DOCTYPE html>

<head>
    <title> odd or even??? </title>
</head>

<body>

 <script>
    function OddorEven(number){

     if (number % 2 == 0) 
      document.write( number + ' is even');
      else
      document.write(number +' is odd');
    }

    var number = prompt('enter your no.');
        OddorEven(number);
 </script>

</body>
</html>
