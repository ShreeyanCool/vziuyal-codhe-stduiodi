<!DOCTYPE html>
<html>

<head>
    <title>Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topnav {
            overflow: hidden;
            background-color: #ff5c5c;
        }

        .topnav a {
            float: left;
            color: #000503;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .topnav a:hover {
            background-color: #ff9696;
            color: rgb(255, 232, 232);
        }

        .topnav a.active {
            background-color: #0091ff;
            color: rgb(255, 255, 255);
        }
    </style>
</head>

<body>
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="#">About Us</a>
        <a href="#">Gallery</a>
        <a href="#">Services</a>
        <a href="#">Offer</a>
        <a href="#">Contact Us</a>
    </div>

    <img src="imagesANDsounds/Blue_OCEAN.JPG">
</body>

</html>
