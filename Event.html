<!DOCTYPE html>
<head>
  <title> A creepy story </title>

  <style>

    body.dark {

        color:white;

        background-color: black;
    }

    button {

        display:block;

        margin: 5px;
    }

    .TextEntry {

        margin-top: 12px;

        margin-bottom: 15px;
    }

  </style>
</head>

<body>

    <h1>  basement </h1>

    <p id="story"> i wanted to find my friend but he was hiding in the basment </p>

    <button onclick= "getDark()"> Get in the mood </button>

    <div class="TextEntry"> Enter your name, If you dare <input type="text" id="name"> </div>

    <button onclick="typeAndScream()"> PLEASE dont click me!! </button>
    <button onclick="finishTheStory()"> Tell me what happened</button>

    <script>
        function getDark() {

             document.body.className = "dark";

        }

        function finishTheStory() {


            document.getElementById("story").innerHTML = "So i carefully searched in the damp dungeon and there you were!"
        }

        function typeAndScream() {

            var name = document.getElementById("name").value;
            alert("i told you not to do that " + name )
        }
    </script>
</body>
</html>
