<!DOCTYPE html>
<head>
        <style>

        .grid-item1 { grid-area: menu;}
        .grid-item2 { grid-area: header;}
        .grid-item3 { grid-area: main;}
        .grid-item4 { grid-area: footer;}

        .grid-container {

            display: grid;
            grid-template-columns: auto auto auto auto auto;
            grid-template: 
            'header header header header header'
            'menu main main main main'
            'menu footer footer footer footer';

            background-color: orange;

            padding: 10px;
         }

         .grid-container div {

            background-color: rgb(0, 157, 255);
            text-align: center;
            padding: 50px;
            border: 5px solid orange
         }

        </style> 

</head>

<body>

<div class="grid-container">
<div class="grid-item1">menu</div>
<div class="grid-item2">header</div>
<div class="grid-item3">main</div>
<div class="grid-item4">footer</div>
</div>



</body>
